# Azure Developer CLI (azd) 設定
name: travel-marketing-agents
metadata:
  template: travel-marketing-agents

services:
  web:
    project: .
    host: containerapp
    language: python
    docker:
      path: Dockerfile
      remoteBuild: true

hooks:
  postprovision:
    shell: sh
    run: uv run python scripts/postprovision.py
    interactive: true
    continueOnError: true

infra:
  provider: bicep
  path: infra
