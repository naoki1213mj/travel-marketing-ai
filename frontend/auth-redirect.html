<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Authentication Redirect</title>
  </head>
  <body>
    <p>Processing authentication...</p>
    <script type="module">
      import { PublicClientApplication } from '@azure/msal-browser'

      // redirect-bridge は popup/iframe flow 専用。redirect flow では
      // acquireTokenRedirect の response を自分で PublicClientApplication を
      // 生成して handleRedirectPromise() で処理し、sessionStorage に
      // account/token を書き込んでから戻る必要がある。
      async function finalize() {
        try {
          const response = await fetch('/api/voice-config')
          if (!response.ok) throw new Error('failed to load auth config')
          const raw = await response.json()
          const clientId = typeof raw?.client_id === 'string' ? raw.client_id.trim() : ''
          const tenantId = typeof raw?.tenant_id === 'string' ? raw.tenant_id.trim() : ''
          if (!clientId || !tenantId) throw new Error('missing client/tenant id')

          const pca = new PublicClientApplication({
            auth: {
              clientId,
              authority: `https://login.microsoftonline.com/${tenantId}`,
              redirectUri: new URL('/auth-redirect.html', window.location.origin).toString(),
            },
            cache: { cacheLocation: 'sessionStorage' },
          })
          await pca.initialize()
          // navigateToLoginRequestUrl:false を handleRedirectPromise に渡すと、
          // MSAL が token 交換前に request.origin へ自動 navigate するのを止められる。
          // bridge 上で token 交換まで完走させ、その後明示的に / へ戻す。
          const result = await pca.handleRedirectPromise({ navigateToLoginRequestUrl: false })
          if (result?.account) {
            pca.setActiveAccount(result.account)
          }
        } catch (err) {
          console.warn('auth-redirect finalize error', err)
        } finally {
          window.location.replace('/')
        }
      }

      finalize()
    </script>
  </body>
</html>
