name: Deploy

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  id-token: write
  contents: read

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') }}
    environment: production
    timeout-minutes: 45
    env:
      DEPLOY_SHA: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}
      IMAGE_PROJECT_ENDPOINT_MAI: ${{ vars.IMAGE_PROJECT_ENDPOINT_MAI }}
      MAI_RESOURCE_NAME: ${{ vars.MAI_RESOURCE_NAME }}
      FABRIC_DATA_AGENT_URL: ${{ vars.FABRIC_DATA_AGENT_URL }}
      FABRIC_DATA_AGENT_URL_V2: ${{ vars.FABRIC_DATA_AGENT_URL_V2 }}
      FABRIC_DATA_AGENT_RUNTIME: ${{ vars.FABRIC_DATA_AGENT_RUNTIME }}
      FABRIC_DATA_AGENT_RUNTIME_VERSION: ${{ vars.FABRIC_DATA_AGENT_RUNTIME_VERSION }}
      FABRIC_SQL_ENDPOINT: ${{ vars.FABRIC_SQL_ENDPOINT }}
      FABRIC_LAKEHOUSE_DATABASE: ${{ vars.FABRIC_LAKEHOUSE_DATABASE }}
      FABRIC_SALES_TABLE: ${{ vars.FABRIC_SALES_TABLE }}
      FABRIC_REVIEWS_TABLE: ${{ vars.FABRIC_REVIEWS_TABLE }}

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ env.DEPLOY_SHA }}

      - name: Azure Login (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install uv
        uses: astral-sh/setup-uv@v8.0.0

      - name: Build and push to ACR
        run: |
          az acr build \
            --registry ${{ vars.ACR_NAME }} \
            --image travel-agents:${DEPLOY_SHA} \
            --image travel-agents:latest \
            --file Dockerfile .

      - name: Capture previous revision
        id: prev-revision
        run: |
          PREV_IMAGE=$(az containerapp show \
            --name ${{ vars.CONTAINER_APP_NAME }} \
            --resource-group ${{ vars.RESOURCE_GROUP }} \
            --query 'properties.template.containers[0].image' -o tsv)
          echo "image=${PREV_IMAGE}" >> "$GITHUB_OUTPUT"

      - name: Deploy to Container Apps
        run: |
          az containerapp update \
            --name ${{ vars.CONTAINER_APP_NAME }} \
            --resource-group ${{ vars.RESOURCE_GROUP }} \
            --image ${{ vars.ACR_NAME }}.azurecr.io/travel-agents:${DEPLOY_SHA}

      - name: Configure optional MAI endpoint
        if: ${{ env.IMAGE_PROJECT_ENDPOINT_MAI != '' }}
        run: |
          az containerapp update \
            --name ${{ vars.CONTAINER_APP_NAME }} \
            --resource-group ${{ vars.RESOURCE_GROUP }} \
            --set-env-vars IMAGE_PROJECT_ENDPOINT_MAI="${IMAGE_PROJECT_ENDPOINT_MAI}"

      - name: Configure optional Fabric endpoints
        if: ${{ env.FABRIC_DATA_AGENT_URL != '' || env.FABRIC_DATA_AGENT_URL_V2 != '' || env.FABRIC_DATA_AGENT_RUNTIME != '' || env.FABRIC_DATA_AGENT_RUNTIME_VERSION != '' || env.FABRIC_SQL_ENDPOINT != '' || env.FABRIC_LAKEHOUSE_DATABASE != '' || env.FABRIC_SALES_TABLE != '' || env.FABRIC_REVIEWS_TABLE != '' }}
        run: |
          env_vars=()
          if [ -n "${FABRIC_DATA_AGENT_URL}" ]; then
            env_vars+=("FABRIC_DATA_AGENT_URL=${FABRIC_DATA_AGENT_URL}")
          fi
          if [ -n "${FABRIC_DATA_AGENT_URL_V2}" ]; then
            env_vars+=("FABRIC_DATA_AGENT_URL_V2=${FABRIC_DATA_AGENT_URL_V2}")
          fi
          if [ -n "${FABRIC_DATA_AGENT_RUNTIME}" ]; then
            env_vars+=("FABRIC_DATA_AGENT_RUNTIME=${FABRIC_DATA_AGENT_RUNTIME}")
          fi
          if [ -n "${FABRIC_DATA_AGENT_RUNTIME_VERSION}" ]; then
            env_vars+=("FABRIC_DATA_AGENT_RUNTIME_VERSION=${FABRIC_DATA_AGENT_RUNTIME_VERSION}")
          fi
          if [ -n "${FABRIC_SQL_ENDPOINT}" ]; then
            env_vars+=("FABRIC_SQL_ENDPOINT=${FABRIC_SQL_ENDPOINT}")
          fi
          if [ -n "${FABRIC_LAKEHOUSE_DATABASE}" ]; then
            env_vars+=("FABRIC_LAKEHOUSE_DATABASE=${FABRIC_LAKEHOUSE_DATABASE}")
          fi
          if [ -n "${FABRIC_SALES_TABLE}" ]; then
            env_vars+=("FABRIC_SALES_TABLE=${FABRIC_SALES_TABLE}")
          fi
          if [ -n "${FABRIC_REVIEWS_TABLE}" ]; then
            env_vars+=("FABRIC_REVIEWS_TABLE=${FABRIC_REVIEWS_TABLE}")
          fi
          az containerapp update \
            --name ${{ vars.CONTAINER_APP_NAME }} \
            --resource-group ${{ vars.RESOURCE_GROUP }} \
            --set-env-vars "${env_vars[@]}"

      - name: Wait for Container Apps provisioning
        run: |
          wait_for_containerapp_provisioning() {
            for i in $(seq 1 30); do
              PROVISIONING_STATE=$(az containerapp show \
                --name ${{ vars.CONTAINER_APP_NAME }} \
                --resource-group ${{ vars.RESOURCE_GROUP }} \
                --query 'properties.provisioningState' -o tsv)
              if [ "$PROVISIONING_STATE" = "Succeeded" ]; then
                echo "Container app provisioning completed."
                return 0
              fi
              echo "Container app provisioning state: ${PROVISIONING_STATE:-unknown} (attempt $i/30)"
              sleep 10
            done
            echo "Container app provisioning did not reach Succeeded in time."
            return 1
          }

          wait_for_containerapp_provisioning

      - name: Sync manager approval trigger URL
        run: |
          wait_for_containerapp_provisioning() {
            for i in $(seq 1 30); do
              PROVISIONING_STATE=$(az containerapp show \
                --name ${{ vars.CONTAINER_APP_NAME }} \
                --resource-group ${{ vars.RESOURCE_GROUP }} \
                --query 'properties.provisioningState' -o tsv)
              if [ "$PROVISIONING_STATE" = "Succeeded" ]; then
                echo "Container app provisioning completed."
                return 0
              fi
              echo "Container app provisioning state: ${PROVISIONING_STATE:-unknown} (attempt $i/30)"
              sleep 10
            done
            echo "Container app provisioning did not reach Succeeded in time."
            return 1
          }

          MANAGER_WORKFLOW_NAME=$(az resource list \
            --resource-group ${{ vars.RESOURCE_GROUP }} \
            --resource-type Microsoft.Logic/workflows \
            --query "[?starts_with(name, 'logic-manager-approval-')].name | [0]" -o tsv)

          if [ -z "$MANAGER_WORKFLOW_NAME" ]; then
            echo "No manager approval workflow found; skipping trigger sync."
            exit 0
          fi

          CALLBACK_URL=$(az rest \
            --method post \
            --url "https://management.azure.com/subscriptions/${{ vars.AZURE_SUBSCRIPTION_ID }}/resourceGroups/${{ vars.RESOURCE_GROUP }}/providers/Microsoft.Logic/workflows/${MANAGER_WORKFLOW_NAME}/triggers/manual/listCallbackUrl?api-version=2019-05-01" \
            --query value -o tsv)

          if [ -z "$CALLBACK_URL" ]; then
            echo "Failed to resolve manager approval trigger URL"
            exit 1
          fi

          az containerapp secret set \
            --name ${{ vars.CONTAINER_APP_NAME }} \
            --resource-group ${{ vars.RESOURCE_GROUP }} \
            --secrets "manager-approval-trigger-url=${CALLBACK_URL}" >/dev/null

          wait_for_containerapp_provisioning

          CURRENT_SECRET_REF=$(az containerapp show \
            --name ${{ vars.CONTAINER_APP_NAME }} \
            --resource-group ${{ vars.RESOURCE_GROUP }} \
            --query "properties.template.containers[0].env[?name=='MANAGER_APPROVAL_TRIGGER_URL'].secretRef | [0]" -o tsv)

          if [ "$CURRENT_SECRET_REF" != "manager-approval-trigger-url" ]; then
            az containerapp update \
              --name ${{ vars.CONTAINER_APP_NAME }} \
              --resource-group ${{ vars.RESOURCE_GROUP }} \
              --set-env-vars MANAGER_APPROVAL_TRIGGER_URL=secretref:manager-approval-trigger-url >/dev/null

            wait_for_containerapp_provisioning
          else
            echo "Manager approval trigger env already references manager-approval-trigger-url; skipping env update."
          fi

          echo "Synced manager approval trigger URL from ${MANAGER_WORKFLOW_NAME}"

      - name: Bootstrap optional MAI RBAC
        if: ${{ env.MAI_RESOURCE_NAME != '' }}
        run: |
          PRINCIPAL_ID=$(az containerapp show \
            --name ${{ vars.CONTAINER_APP_NAME }} \
            --resource-group ${{ vars.RESOURCE_GROUP }} \
            --query 'identity.principalId' -o tsv)
          MAI_SCOPE=$(az cognitiveservices account show \
            --name "${MAI_RESOURCE_NAME}" \
            --resource-group ${{ vars.RESOURCE_GROUP }} \
            --query 'id' -o tsv)

          for ROLE in \
            "Cognitive Services Contributor" \
            "Cognitive Services OpenAI User" \
            "Azure AI Developer" \
            "Azure AI User" \
            "Cognitive Services User"
          do
            az role assignment create \
              --assignee-object-id "$PRINCIPAL_ID" \
              --assignee-principal-type ServicePrincipal \
              --role "$ROLE" \
              --scope "$MAI_SCOPE" \
              --only-show-errors >/dev/null 2>&1 || true
          done

      - name: Deploy improvement MCP Function
        env:
          AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
          AZURE_RESOURCE_GROUP: ${{ vars.RESOURCE_GROUP }}
          AZURE_CONTAINER_APP_NAME: ${{ vars.CONTAINER_APP_NAME }}
        # improvement-mcp は APIM 経由で本番アプリから参照されるため、
        # ready-to-run package 配備に失敗した場合はそのまま deploy を失敗させる。
        run: uv run --with azure-identity python scripts/deploy_improvement_mcp.py

      - name: Health check
        run: |
          APP_URL=$(az containerapp show \
            --name ${{ vars.CONTAINER_APP_NAME }} \
            --resource-group ${{ vars.RESOURCE_GROUP }} \
            --query 'properties.configuration.ingress.fqdn' -o tsv)
          for i in 1 2 3 4 5; do
            if curl -sf "https://${APP_URL}/api/health"; then
              echo "Health check passed"
              exit 0
            fi
            echo "Retry $i..."
            sleep 10
          done
          echo "Health check failed"
          exit 1

      - name: Readiness check
        run: |
          APP_URL=$(az containerapp show \
            --name ${{ vars.CONTAINER_APP_NAME }} \
            --resource-group ${{ vars.RESOURCE_GROUP }} \
            --query 'properties.configuration.ingress.fqdn' -o tsv)
          for i in 1 2 3 4 5; do
            if curl -sf "https://${APP_URL}/api/ready"; then
              echo "Readiness check passed"
              exit 0
            fi
            echo "Retry $i..."
            sleep 10
          done
          echo "Readiness check failed"
          exit 1

      - name: Rollback on failure
        if: failure() && steps.prev-revision.outputs.image != ''
        run: |
          wait_for_containerapp_provisioning() {
            for i in $(seq 1 30); do
              PROVISIONING_STATE=$(az containerapp show \
                --name ${{ vars.CONTAINER_APP_NAME }} \
                --resource-group ${{ vars.RESOURCE_GROUP }} \
                --query 'properties.provisioningState' -o tsv)
              if [ "$PROVISIONING_STATE" = "Succeeded" ]; then
                echo "Container app provisioning completed."
                return 0
              fi
              echo "Container app provisioning state: ${PROVISIONING_STATE:-unknown} (attempt $i/30)"
              sleep 10
            done
            echo "Container app provisioning did not reach Succeeded in time; attempting rollback anyway."
            return 0
          }

          wait_for_containerapp_provisioning
          echo "Rolling back to previous image: ${{ steps.prev-revision.outputs.image }}"
          az containerapp update \
            --name ${{ vars.CONTAINER_APP_NAME }} \
            --resource-group ${{ vars.RESOURCE_GROUP }} \
            --image ${{ steps.prev-revision.outputs.image }}
