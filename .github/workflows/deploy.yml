name: Deploy

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    environment: production
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Build and push to ACR
        run: |
          az acr build \
            --registry ${{ vars.ACR_NAME }} \
            --image travel-agents:${{ github.sha }} \
            --image travel-agents:latest \
            --file Dockerfile .

      - name: Capture previous revision
        id: prev-revision
        run: |
          PREV_IMAGE=$(az containerapp show \
            --name ${{ vars.CONTAINER_APP_NAME }} \
            --resource-group ${{ vars.RESOURCE_GROUP }} \
            --query 'properties.template.containers[0].image' -o tsv)
          echo "image=${PREV_IMAGE}" >> "$GITHUB_OUTPUT"

      - name: Deploy to Container Apps
        run: |
          az containerapp update \
            --name ${{ vars.CONTAINER_APP_NAME }} \
            --resource-group ${{ vars.RESOURCE_GROUP }} \
            --image ${{ vars.ACR_NAME }}.azurecr.io/travel-agents:${{ github.sha }}

      - name: Configure optional MAI endpoint
        if: ${{ vars.IMAGE_PROJECT_ENDPOINT_MAI != '' }}
        run: |
          az containerapp update \
            --name ${{ vars.CONTAINER_APP_NAME }} \
            --resource-group ${{ vars.RESOURCE_GROUP }} \
            --set-env-vars IMAGE_PROJECT_ENDPOINT_MAI='${{ vars.IMAGE_PROJECT_ENDPOINT_MAI }}'

      - name: Bootstrap optional MAI RBAC
        if: ${{ vars.MAI_RESOURCE_NAME != '' }}
        run: |
          PRINCIPAL_ID=$(az containerapp show \
            --name ${{ vars.CONTAINER_APP_NAME }} \
            --resource-group ${{ vars.RESOURCE_GROUP }} \
            --query 'identity.principalId' -o tsv)
          MAI_SCOPE=$(az cognitiveservices account show \
            --name ${{ vars.MAI_RESOURCE_NAME }} \
            --resource-group ${{ vars.RESOURCE_GROUP }} \
            --query 'id' -o tsv)

          for ROLE in \
            "Cognitive Services Contributor" \
            "Cognitive Services OpenAI User" \
            "Azure AI Developer" \
            "Azure AI User" \
            "Cognitive Services User"
          do
            az role assignment create \
              --assignee-object-id "$PRINCIPAL_ID" \
              --assignee-principal-type ServicePrincipal \
              --role "$ROLE" \
              --scope "$MAI_SCOPE" \
              --only-show-errors >/dev/null 2>&1 || true
          done

      - name: Health check
        run: |
          APP_URL=$(az containerapp show \
            --name ${{ vars.CONTAINER_APP_NAME }} \
            --resource-group ${{ vars.RESOURCE_GROUP }} \
            --query 'properties.configuration.ingress.fqdn' -o tsv)
          for i in 1 2 3 4 5; do
            if curl -sf "https://${APP_URL}/api/health"; then
              echo "Health check passed"
              exit 0
            fi
            echo "Retry $i..."
            sleep 10
          done
          echo "Health check failed"
          exit 1

      - name: Readiness check
        run: |
          APP_URL=$(az containerapp show \
            --name ${{ vars.CONTAINER_APP_NAME }} \
            --resource-group ${{ vars.RESOURCE_GROUP }} \
            --query 'properties.configuration.ingress.fqdn' -o tsv)
          for i in 1 2 3 4 5; do
            if curl -sf "https://${APP_URL}/api/ready"; then
              echo "Readiness check passed"
              exit 0
            fi
            echo "Retry $i..."
            sleep 10
          done
          echo "Readiness check failed"
          exit 1

      - name: Rollback on failure
        if: failure()
        run: |
          echo "Rolling back to previous image: ${{ steps.prev-revision.outputs.image }}"
          az containerapp update \
            --name ${{ vars.CONTAINER_APP_NAME }} \
            --resource-group ${{ vars.RESOURCE_GROUP }} \
            --image ${{ steps.prev-revision.outputs.image }}
