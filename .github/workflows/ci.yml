name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.0.0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install Python dependencies
        run: uv sync --frozen

      - name: Foundry preview SDK smoke import (PR 3)
        # MicrosoftFabricPreviewTool / FabricDataAgentToolParameters は preview class なので、
        # SDK のメジャーアップデートで location が drift していないかを CI で早期検知する。
        run: uv run python -c "from azure.ai.projects.models import MicrosoftFabricPreviewTool, FabricDataAgentToolParameters, ToolProjectConnection, ToolChoiceAllowed; print('preview SDK ok')"

      - name: Bicep build (infra/main.bicep)
        # IaC fresh-deploy は azd の `provider: bicep` 経由で main.bicep を直接コンパイルする。
        # チェックイン済の main.json は廃止したので、CI で構文/参照エラーが入らないかをここで担保する。
        run: az bicep build --file infra/main.bicep --outfile $RUNNER_TEMP/main_check.json

      - name: Ruff lint
        run: uv run ruff check .

      - name: pytest
        run: uv run python -m pytest tests/ -v --ignore=tests/test_fabric_data_agent_integration.py

      - name: pytest (Fabric integration, opt-in)
        # Runs only when the GH variable AND secret are both present.
        # NOTE: GitHub Actions does not allow `secrets.*` references inside
        # an `if:` expression directly. We surface presence via env first.
        env:
          FABRIC_DATA_AGENT_URL_V2: ${{ vars.FABRIC_DATA_AGENT_URL_V2 }}
          AZURE_CLIENT_ID: ${{ secrets.FABRIC_TEST_AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.FABRIC_TEST_AZURE_CLIENT_SECRET }}
          AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
          HAS_FABRIC_SECRET: ${{ secrets.FABRIC_TEST_AZURE_CLIENT_SECRET != '' }}
        if: env.FABRIC_DATA_AGENT_URL_V2 != '' && env.HAS_FABRIC_SECRET == 'true'
        run: uv run python -m pytest tests/test_fabric_data_agent_integration.py -v
        continue-on-error: true

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Frontend lint
        run: cd frontend && npm run lint

      - name: Guard against APIM /app prefix bypass (Bug C regression)
        # Bug C (2026-05-03): SPA は APIM の /app/* reverse proxy 経由で配信される。
        # `fetch('/api/...'` や `new URL('/api/...', window.location.origin)` のような
        # 直接書きは BASE_URL を bypass し、APIM の `spa-app` API (path=app) に
        # match せず silent 404 になる。test ファイル以外で発見したら CI を fail させる。
        run: |
          set +e
          BAD_FETCH=$(grep -RInE "fetch\(\s*['\"\`]/api" frontend/src --include='*.ts' --include='*.tsx' --exclude='*.test.ts' --exclude='*.test.tsx' || true)
          BAD_NEW_URL=$(grep -RInE "new URL\(\s*['\"\`]/api" frontend/src --include='*.ts' --include='*.tsx' --exclude='*.test.ts' --exclude='*.test.tsx' || true)
          if [ -n "$BAD_FETCH" ] || [ -n "$BAD_NEW_URL" ]; then
            echo "ERROR: Found raw /api fetch / new URL bypass that skips apiUrl() helper:"
            echo "$BAD_FETCH"
            echo "$BAD_NEW_URL"
            echo ""
            echo "Use apiUrl(path) from frontend/src/lib/api-base.ts so the APIM /app/* prefix is preserved."
            exit 1
          fi
          echo "OK: no raw /api fetch / new URL bypass found"

      - name: TypeScript check
        run: cd frontend && npx tsc --noEmit

      - name: Frontend build
        run: cd frontend && npm run build
